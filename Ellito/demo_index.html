<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Local Demo Upload</title>
</head>
<body>
  <h1>Local Demo Upload</h1>
  <form id="uploadForm">
    <label>File
      <input id="fileInput" type="file" required />
    </label>
    <label>Description
      <textarea id="description" rows="3" placeholder="optional sample metadata"></textarea>
    </label>
    <button type="submit">Upload</button>
  </form>

  <pre id="result">Status: idle</pre>

  <script src="/demo_app.js"></script>
</body>
</html>
